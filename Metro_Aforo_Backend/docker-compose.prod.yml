version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: aqp-postgres
    restart: always
    environment:
      POSTGRES_DB: aqp_aforo
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - aqp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aqp-backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-aqp_aforo}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      CORS_ORIGIN: ${CORS_ORIGIN}
      DNI_API_BASE_URL: ${DNI_API_BASE_URL}
      DNI_API_TOKEN: ${DNI_API_TOKEN}
      DNI_API_TIMEOUT: ${DNI_API_TIMEOUT:-10000}
    volumes:
      - uploads_data:/app/uploads
    networks:
      - aqp-network

  frontend:
    build:
      context: ../Metro_Aforo_Frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: aqp-frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - /opt/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - aqp-network

volumes:
  postgres_data:
  uploads_data:

networks:
  aqp-network:
    driver: bridge
